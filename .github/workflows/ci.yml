# =============================================================================
# SeaRise Europe — CI Pipeline
# =============================================================================
# Epic:   E-02 (Local Development Environment)
# Story:  S02-03
# Source: docs/architecture/08-deployment-topology.md section 6
#
# Triggers on pull requests to master, pushes to master, and manual dispatch.
# Runs: lint, type check, unit tests, Docker builds, and TiTiler pull verification.
# No deployment steps — deployment is deferred to Epic 08.
# =============================================================================

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: lint, type-check, unit tests
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (lint, type-check, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=critical --omit=dev
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Content guidelines lint
        run: npm run lint:content

      - name: i18n externalization lint
        run: npm run lint:i18n

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # API: format check, build, unit tests
  # ---------------------------------------------------------------------------
  api:
    name: API (format, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SeaRise.sln

      - name: Audit dependencies
        run: dotnet list SeaRise.sln package --vulnerable --include-transitive 2>&1 | tee audit.txt && ! grep -qi 'has the following vulnerable packages' audit.txt

      - name: Format check
        run: dotnet format SeaRise.sln --verify-no-changes

      - name: Build
        run: dotnet build SeaRise.sln --no-restore -c Release

      - name: Unit Tests
        run: dotnet test SeaRise.sln --no-build -c Release --verbosity normal --filter "Category=Unit"

      - name: Integration Tests
        run: dotnet test SeaRise.sln --no-build -c Release --verbosity normal --filter "Category=Integration"

  # ---------------------------------------------------------------------------
  # Pipeline: lint, type-check, unit tests
  # ---------------------------------------------------------------------------
  pipeline:
    name: Pipeline (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/pipeline
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff mypy pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports

      - name: Unit tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Docker: build all three images (no push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: src/frontend
            image: searise-frontend
          - context: src/api
            image: searise-api
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Build ${{ matrix.image }}
        run: docker build -t ${{ matrix.image }}:ci ${{ matrix.context }}

  docker-build-tiler:
    name: Docker Pull (TiTiler)
    runs-on: ubuntu-latest
    steps:
      - name: Pull TiTiler image
        run: docker pull ghcr.io/developmentseed/titiler:2.0.0
