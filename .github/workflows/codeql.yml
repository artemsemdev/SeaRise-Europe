# =============================================================================
# SeaRise Europe — CodeQL Analysis
# =============================================================================
# Runs GitHub CodeQL security analysis on push/PR to master and weekly.
# Languages: JavaScript/TypeScript (frontend), C# (API)
# =============================================================================

name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, csharp]
        include:
          - language: javascript-typescript
            build-mode: none
          - language: csharp
            build-mode: manual
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build C#
        if: matrix.language == 'csharp'
        run: dotnet build src/api/SeaRise.sln

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.35.1
        with:
          category: "/language:${{ matrix.language }}"
