# =============================================================================
# SeaRise Europe — Dependabot Configuration
# =============================================================================
# Automated dependency update PRs for npm, NuGet, pip, GitHub Actions, and Docker.
# Groups related updates into single PRs to reduce noise.
# =============================================================================

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/src/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      all-npm:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/src/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "api"
    groups:
      all-nuget:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/src/pipeline"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "pipeline"
    groups:
      all-pip:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/src/frontend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/src/api"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
