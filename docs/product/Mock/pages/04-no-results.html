<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeaRise Europe — No Results</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="design-system.css">
  <style>
    .search-float {
      position: absolute;
      top: var(--sp6);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 520px;
      gap: var(--sp4);
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: var(--s-low);
      border-radius: var(--r-lg);
      padding: var(--sp2) var(--sp4);
      width: 100%;
      gap: var(--sp3);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--f-b);
      font-size: .95rem;
      color: var(--text);
      padding: var(--sp3) 0;
    }
    .clear-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--s-high);
      border: none;
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background .2s;
      text-decoration: none;
      flex-shrink: 0;
    }
    .clear-btn:hover { background: var(--s-bright); }
    .no-results-card {
      width: 100%;
      background: var(--s-low);
      border-radius: var(--r-lg);
      padding: var(--sp8) var(--sp6);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp4);
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
    }
    .no-results-card .empty-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--s-high);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .no-results-card h2 {
      font-family: var(--f-d);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }
    .no-results-card p {
      font-size: .85rem;
      color: var(--text2);
      line-height: 1.6;
      max-width: 360px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Topbar -->
    <header class="topbar">
      <a href="01-landing.html" class="topbar-brand">SEARISE EUROPE</a>
      <nav>
        <ul class="topbar-nav">
          <li><a href="01-landing.html" class="active">Explorer</a></li>
          <li><a href="14-about.html">About Data</a></li>
        </ul>
      </nav>
      <div class="topbar-right">
        <button class="icon-btn" title="Help">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </button>
      </div>
    </header>

    <!-- Main -->
    <div class="main">
      <div class="map-area">
        <div id="map"></div>

        <!-- Floating search + no-results card -->
        <div class="search-float">
          <div class="search-bar">
            <svg style="color:var(--text3);flex-shrink:0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" value="Xyzzyplugh" readonly>
            <a href="01-landing.html" class="clear-btn" title="Clear search">&times;</a>
          </div>

          <div class="no-results-card">
            <div class="empty-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
            </div>
            <h2>No locations found</h2>
            <p>We couldn't find that place. Check the spelling, or try a well-known European city or coastal area.</p>
            <a href="01-landing.html" class="btn btn-ghost">Clear search</a>
          </div>
        </div>

        <!-- Map controls -->
        <div class="map-controls">
          <button class="map-ctrl" title="Zoom in">+</button>
          <button class="map-ctrl" title="Zoom out">&minus;</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>&copy; 2026 SeaRise Europe. Data: NASA, Copernicus, IPCC.</span>
      <div>
        <a href="14-about.html">About Data</a>
        <a href="#">Privacy</a>
      </div>
    </footer>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', {
      center: [50, 15],
      zoom: 5,
      zoomControl: false,
      attributionControl: false
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      subdomains: 'abcd'
    }).addTo(map);

    document.querySelector('.map-ctrl[title="Zoom in"]').addEventListener('click', () => map.zoomIn());
    document.querySelector('.map-ctrl[title="Zoom out"]').addEventListener('click', () => map.zoomOut());
  </script>
</body>
</html>
