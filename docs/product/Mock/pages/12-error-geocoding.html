<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeaRise Europe — Search Error</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="design-system.css">
  <style>
    .search-float {
      position: absolute;
      top: var(--sp6);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp4);
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: var(--s-low);
      border-radius: var(--r-lg);
      padding: var(--sp2) var(--sp4);
      width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      gap: var(--sp3);
    }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--f-b);
      font-size: .95rem;
      color: var(--text);
      padding: var(--sp3) 0;
    }
    .error-actions {
      display: flex;
      gap: var(--sp3);
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Topbar -->
    <header class="topbar">
      <a href="01-landing.html" class="topbar-brand">SEARISE EUROPE</a>
      <nav>
        <ul class="topbar-nav">
          <li><a href="01-landing.html" class="active">Explorer</a></li>
          <li><a href="14-about.html">About Data</a></li>
        </ul>
      </nav>
      <div class="topbar-right">
        <button class="icon-btn" title="Help">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </button>
      </div>
    </header>

    <!-- Main -->
    <div class="main">
      <div class="map-area">
        <div id="map"></div>

        <!-- Floating search bar + error -->
        <div class="search-float">
          <div class="search-bar">
            <svg style="color:var(--text3);flex-shrink:0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" value="Bordeaux" readonly>
          </div>

          <div class="error-banner">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            Search temporarily unavailable. Please try again.
          </div>

          <div class="error-actions">
            <a href="02-search-loading.html" class="btn btn-primary">Retry</a>
            <a href="01-landing.html" class="btn btn-ghost">Clear</a>
          </div>
        </div>

        <!-- Map controls -->
        <div class="map-controls">
          <button class="map-ctrl" title="Zoom in">+</button>
          <button class="map-ctrl" title="Zoom out">&minus;</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>&copy; 2026 SeaRise Europe. Data: NASA, Copernicus, IPCC.</span>
      <div>
        <a href="14-about.html">About Data</a>
        <a href="#">Privacy</a>
      </div>
    </footer>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', {
      center: [50, 15],
      zoom: 5,
      zoomControl: false,
      attributionControl: false
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      subdomains: 'abcd'
    }).addTo(map);

    document.querySelector('.map-ctrl[title="Zoom in"]').addEventListener('click', () => map.zoomIn());
    document.querySelector('.map-ctrl[title="Zoom out"]').addEventListener('click', () => map.zoomOut());
  </script>
</body>
</html>
